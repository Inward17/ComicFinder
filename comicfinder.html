// This is a legacy file and is no longer used. Please use index.html instead.

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MangaFinder Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    :root {
      --bg: #f5f3ee;
      --text: #1a1a1a;
      --card-bg: #fff;
      --border: #e0ddd7;
      --primary: #4285F4;
      --primary-hover: #3367D6;
      --text-muted: #666;
      --pill-bg: #f0f0f0;
      --badge-bg: #E8F0FE;
      --badge-text: #1967D2;
    }

    /* Dark Mode Variables */
    body.dark-mode {
      --bg: #0f0f11;
      --text: #f0f0f0;
      --card-bg: #1a1a1c;
      --border: #2a2a2d;
      --primary: #5c9bff;
      --primary-hover: #4285F4;
      --text-muted: #a0a0a0;
      --pill-bg: #2a2a2d;
      --badge-bg: #19325f;
      --badge-text: #8ab4f8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
      transition: background 0.3s, color 0.3s;
    }

    .container { width: 100%; max-width: 680px; }

    .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.75rem; }
    .header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      letter-spacing: 3px;
      line-height: 1;
    }
    .header h1 span { color: var(--primary); }
    .header p { font-size: 13px; color: var(--text-muted); margin-top: 6px; }

    .theme-toggle {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 20px; padding: 5px;
      transition: color 0.2s;
    }
    .theme-toggle:hover { color: var(--primary); }

    .search-row { display: flex; gap: 8px; margin-bottom: 1.25rem; }
    .search-row input {
      flex: 1; height: 48px; font-size: 15px; padding: 0 16px;
      border-radius: 10px; border: 1px solid var(--border);
      background: var(--card-bg); color: var(--text);
      font-family: 'DM Sans', sans-serif; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-row input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(66, 133, 244, 0.15); }
    
    .search-row button {
      height: 48px; padding: 0 24px; border-radius: 10px;
      background: var(--primary); color: #fff; border: none;
      font-size: 14px; font-weight: 500; cursor: pointer;
      font-family: 'DM Sans', sans-serif; display: flex;
      align-items: center; gap: 6px; transition: background 0.2s;
    }
    .search-row button:hover { background: var(--primary-hover); }
    .search-row button:disabled { background: var(--text-muted); cursor: not-allowed; }

    .status { font-size: 13px; color: var(--text-muted); margin-bottom: 1rem; min-height: 20px; display: flex; align-items: center; gap: 7px; }

    .spinner {
      width: 14px; height: 14px; border: 2px solid var(--border);
      border-top-color: var(--primary); border-radius: 50%;
      animation: spin 0.7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .result-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.25rem; margin-bottom: 12px;
      transition: transform 0.2s, border-color 0.2s;
    }
    .result-card:hover { transform: translateY(-2px); border-color: var(--primary); }
    .result-card.best { border: 2px solid var(--primary); }

    .badge {
      display: inline-block; font-size: 11px; font-weight: 500;
      padding: 4px 10px; border-radius: 6px;
      background: var(--badge-bg); color: var(--badge-text);
      margin-bottom: 10px;
    }

    .result-title { font-size: 17px; font-weight: 500; margin-bottom: 4px; }
    .result-site { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }

    .result-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .pill {
      font-size: 11px; padding: 4px 10px; border-radius: 20px;
      background: var(--pill-bg); color: var(--text-muted);
    }
    .pill.good { background: rgba(59, 109, 17, 0.1); color: #4CAF50; }
    .pill.warn { background: rgba(239, 159, 39, 0.1); color: #F57C00; }

    .result-note { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; line-height: 1.4; }

    .btn-read {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 20px; background: var(--primary); color: #fff;
      border-radius: 8px; font-size: 13px; font-weight: 500;
      text-decoration: none; transition: background 0.2s;
    }
    .btn-read:hover { background: var(--primary-hover); }

    .empty {
      font-size: 14px; color: var(--text-muted); text-align: center;
      padding: 3rem 1rem; background: var(--card-bg);
      border-radius: 12px; border: 1px solid var(--border);
    }
    .empty i { font-size: 32px; display: block; margin-bottom: 12px; opacity: 0.5; }

    .history { margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1.25rem; }
    .history-title {
      font-size: 11px; color: var(--text-muted); font-weight: 500;
      letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 12px;
    }
    .chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
      font-size: 12px; cursor: pointer; margin: 0 6px 8px 0;
      color: var(--text-muted); background: var(--card-bg);
      transition: all 0.2s;
    }
    .chip:hover { border-color: var(--primary); color: var(--primary); }

    .api-notice {
      background: rgba(239, 159, 39, 0.1); border: 1px solid #EF9F27;
      border-radius: 8px; padding: 12px 16px; font-size: 13px;
      color: #F57C00; margin-bottom: 1.25rem; display: none;
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header-top">
    <div class="header">
      <h1>MANGA<span>FINDER</span> PRO</h1>
      <p>Powered by Gemini 2.5 — Smart Search & Caching</p>
    </div>
    <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" title="Toggle Dark Mode">
      <i class="ti ti-moon-filled"></i>
    </button>
  </div>

  <div class="api-notice" id="apiNotice">
    <strong>⚠️ API Key Required</strong>
    Please insert your new Gemini API key in the code.
  </div>

  <div class="search-row">
    <input type="text" id="inp" placeholder="e.g. Solo Leveling, One Piece..." autocomplete="off" />
    <button id="searchBtn" onclick="doSearch()">
      <i class="ti ti-search"></i> Find
    </button>
  </div>

  <div class="status" id="status"></div>
  <div id="results"></div>

  <div class="history" id="historySection" style="display:none">
    <div class="history-title">Recent Searches</div>
    <div id="historyChips"></div>
  </div>

</div>

<script>
  // ============================================================
  //  PASTE YOUR NEW GEMINI API KEY BELOW
  // ============================================================
  const API_KEY = "YOUR_NEW_API_KEY_HERE";
  // ============================================================

  const inp = document.getElementById('inp');
  const btn = document.getElementById('searchBtn');
  const statusEl = document.getElementById('status');
  const resultsEl = document.getElementById('results');
  let history = JSON.parse(localStorage.getItem('mf_history') || '[]');

  // Setup Dark Mode from saved preference
  if (localStorage.getItem('mf_theme') === 'dark') {
    document.body.classList.add('dark-mode');
    document.getElementById('themeBtn').innerHTML = '<i class="ti ti-sun-filled"></i>';
  }

  if (!API_KEY || API_KEY.includes("YOUR_NEW")) {
    document.getElementById('apiNotice').style.display = 'block';
  }

  inp.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
  renderHistory();

  function toggleTheme() {
    const isDark = document.body.classList.toggle('dark-mode');
    document.getElementById('themeBtn').innerHTML = isDark ? '<i class="ti ti-sun-filled"></i>' : '<i class="ti ti-moon-filled"></i>';
    localStorage.setItem('mf_theme', isDark ? 'dark' : 'light');
  }

  function showStatus(msg, spin = false) {
    statusEl.innerHTML = (spin ? '<div class="spinner"></div>' : '') + `<span>${msg}</span>`;
  }

  function setLoading(on) {
    btn.disabled = on;
    btn.innerHTML = on ? '<i class="ti ti-loader-2"></i> Searching…' : '<i class="ti ti-search"></i> Find';
  }

  async function doSearch() {
    const q = inp.value.trim();
    if (!q) return;

    // 1. SMART CACHING: Check if we already searched this recently
    const cacheKey = `mf_cache_${q.toLowerCase()}`;
    const cachedData = localStorage.getItem(cacheKey);
    
    if (cachedData) {
      showStatus('Loaded from local cache instantly! ⚡');
      renderResults(JSON.parse(cachedData), q);
      addHistory(q);
      return;
    }

    if (!API_KEY || API_KEY.includes("YOUR_NEW")) {
      showStatus("Please add your Gemini API key in the script section.");
      return;
    }

    setLoading(true);
    resultsEl.innerHTML = '';
    showStatus('Gemini is scanning the web...', true);

    const prompt = `You are a manga/manhwa reading assistant. Search the web to find the best working English reading sites for: "${q}".
    
    Return ONLY a JSON array of objects with these keys: title, site, url, language, free, official, status, chaptersAvailable, notes.
    
    CRITICAL URL RULES:
    - The "url" MUST be the exact, direct deep-link to the manga's main series page (e.g., domain.com/manga/exact-title).
    - NEVER return a root domain or homepage URL. If you cannot confidently find the direct deep-link, DO NOT include that site.
    
    Do not include any introductory text or explanations.`;

    try {
      const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;
      
      const resp = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          tools: [{ googleSearch: {} }], 
          generationConfig: { temperature: 0.2 }
        })
      });

      const data = await resp.json();
      if (data.error) throw new Error(data.error.message);

      let textResponse = data.candidates[0].content.parts[0].text;
      const jsonStart = textResponse.indexOf('[');
      const jsonEnd = textResponse.lastIndexOf(']');
      if (jsonStart !== -1 && jsonEnd !== -1) {
          textResponse = textResponse.slice(jsonStart, jsonEnd + 1);
      }

      const sites = JSON.parse(textResponse);

      // 2. SAVE TO CACHE: Save the result so we don't have to fetch it next time
      localStorage.setItem(cacheKey, JSON.stringify(sites));

      showStatus('');
      renderResults(sites, q);
      addHistory(q);
    } catch (err) {
      console.error(err);
      showStatus('');
      resultsEl.innerHTML = `<div class="empty"><i class="ti ti-alert-circle"></i>Error: ${err.message || 'Check console for details.'}</div>`;
    }

    setLoading(false);
  }

  function renderResults(sites, query) {
    if (!sites || !sites.length || (sites.length === 1 && sites[0].site === 'not found')) {
      resultsEl.innerHTML = `<div class="empty"><i class="ti ti-ghost"></i><strong>${query}</strong> wasn't found.<br><span style="font-size:13px;margin-top:8px;display:block">Try checking the spelling or use the Japanese/Korean name.</span></div>`;
      return;
    }

    let html = '';
    sites.forEach((s, i) => {
      const isBest = i === 0;
      html += `<div class="result-card ${isBest ? 'best' : ''}">`;
      if (isBest) html += `<div class="badge"><i class="ti ti-star-filled"></i> Top Recommendation</div>`;
      html += `<div class="result-title">${s.title || query}</div>`;
      html += `<div class="result-site"><i class="ti ti-world" style="font-size:14px;vertical-align:-2px;margin-right:4px"></i>${s.site}</div>`;
      html += `<div class="result-meta">`;
      html += `<span class="pill good"><i class="ti ti-language" style="font-size:13px;vertical-align:-2px;margin-right:3px"></i>${s.language || 'English'}</span>`;
      html += s.free
        ? `<span class="pill good"><i class="ti ti-currency-dollar-off" style="font-size:13px;vertical-align:-2px;margin-right:3px"></i>Free</span>`
        : `<span class="pill warn">Paid / Sub</span>`;
      if (s.official) html += `<span class="pill good"><i class="ti ti-shield-check" style="font-size:13px;vertical-align:-2px;margin-right:3px"></i>Official</span>`;
      if (s.status) html += `<span class="pill">${s.status}</span>`;
      if (s.chaptersAvailable) html += `<span class="pill">${s.chaptersAvailable} ch.</span>`;
      html += `</div>`;
      if (s.notes) html += `<div class="result-note">${s.notes}</div>`;
      if (s.url) html += `<a class="btn-read" href="${s.url}" target="_blank" rel="noopener"><i class="ti ti-book-2"></i> Read now <i class="ti ti-external-link" style="font-size:14px"></i></a>`;
      html += `</div>`;
    });

    resultsEl.innerHTML = html;
  }

  function addHistory(q) {
    history = [q, ...history.filter(h => h.toLowerCase() !== q.toLowerCase())].slice(0, 8);
    localStorage.setItem('mf_history', JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    const sec = document.getElementById('historySection');
    const chips = document.getElementById('historyChips');
    if (!history.length) { sec.style.display = 'none'; return; }
    sec.style.display = 'block';
    chips.innerHTML = history.map(h =>
      `<span class="chip" onclick="fillAndSearch('${h.replace(/'/g, "\\'")}')"><i class="ti ti-clock" style="font-size:13px"></i> ${h}</span>`
    ).join('');
  }

  function fillAndSearch(q) {
    inp.value = q;
    doSearch();
  }
</script>
</body>
</html>
