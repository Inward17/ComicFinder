

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MangaFinder Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="container">

  <div class="header-top">
    <div class="header">
      <h1>MANGA<span>FINDER</span> PRO</h1>
      <p>Powered by Gemini 2.5 — Smart Search & Caching</p>
    </div>
    <button class="theme-toggle" id="themeBtn" title="Toggle Dark Mode">
      <i class="ti ti-moon-filled"></i>
    </button>
  </div>

  <div class="nav-tabs">
    <button class="nav-tab active" id="tabSearch"><i class="ti ti-search"></i> Search</button>
    <button class="nav-tab" id="tabBookmarks"><i class="ti ti-bookmark"></i> Watchlist <span id="bookmarkCount" class="badge-count" style="display:none">0</span></button>
  </div>

  <div id="searchView">

  <div class="search-row">
    <input type="text" id="inp" placeholder="e.g. Solo Leveling, One Piece..." autocomplete="off" />
    <button id="searchBtn">
      <i class="ti ti-search"></i> Find
    </button>
  </div>

  <div class="status" id="status"></div>
  <div id="results"></div>

    <div class="history" id="historySection" style="display:none">
      <div class="history-title">Recent Searches</div>
      <div id="historyChips"></div>
    </div>
  </div> <!-- End searchView -->

  <div id="bookmarksView" style="display:none">
    <div class="bookmarks-header">
      <h2>My Watchlist</h2>
      <button id="checkAllBtn" class="btn-check-all"><i class="ti ti-refresh"></i> Check All Updates</button>
    </div>
    <div id="bookmarksGrid" class="bookmarks-grid"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
